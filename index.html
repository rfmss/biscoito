<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0a06">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biscoito">
<link rel="manifest" href="manifest.json">
<title>Biscoito da Sorte</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;1,300;1,400&display=swap');

:root {
  --gold:#f5c842; --gold2:#d4a012; --gold3:#8b6500;
  --amber:#e8891a; --teal:#2ecc9b; --bg:#0d0a06;
  --parchment:#f5ecd4; --brown:#5c3010;
}

*{margin:0;padding:0;box-sizing:border-box}

body {
  min-height:100vh;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* ── Fundo estrelado ── */
.bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 30%,rgba(74,144,217,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 70%,rgba(155,89,182,.07) 0%,transparent 55%),
    #0d0a06;
}
.star{position:absolute;border-radius:50%;background:#fff;
  -webkit-animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s);
  animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s)}
@-webkit-keyframes tw{0%,100%{opacity:.07;-webkit-transform:scale(1)}50%{opacity:var(--mo,.7);-webkit-transform:scale(1.4)}}
@keyframes tw{0%,100%{opacity:.07;transform:scale(1)}50%{opacity:var(--mo,.7);transform:scale(1.4)}}

/* ── Partículas ambientais ── */
.ap{position:fixed;border-radius:50%;pointer-events:none;
  -webkit-animation:afp var(--d,8s) ease-in-out infinite var(--dl,0s);
  animation:afp var(--d,8s) ease-in-out infinite var(--dl,0s);opacity:0}
@-webkit-keyframes afp{0%,100%{-webkit-transform:translateY(0) scale(1);opacity:0}20%{opacity:.8}80%{opacity:.4}100%{-webkit-transform:translateY(-140px) translateX(var(--dx,0px)) scale(.15);opacity:0}}
@keyframes afp{0%,100%{transform:translateY(0) scale(1);opacity:0}20%{opacity:.8}80%{opacity:.4}100%{transform:translateY(-140px) translateX(var(--dx,0px)) scale(.15);opacity:0}}

@-webkit-keyframes up{from{opacity:0;-webkit-transform:translateY(14px)}to{opacity:1;-webkit-transform:none}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── Screens ── */
.screen{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.screen.hidden{display:none}

/* ── Tela de setup ── */
.setup-box{background:rgba(20,12,4,.92);border:1px solid rgba(245,200,66,.18);border-radius:8px;padding:36px 28px;width:min(340px,92vw);text-align:center;box-shadow:0 0 60px rgba(245,200,66,.08);}
.setup-title{font-size:11px;letter-spacing:4px;color:var(--gold2);text-transform:uppercase;opacity:.6;margin-bottom:6px}
.setup-h{font-size:22px;font-weight:900;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(180deg,#ffdf6b 0%,#d4a012 55%,#e8891a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:28px}
.setup-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,200,66,.45);text-align:left;margin-bottom:8px;display:block}
.setup-input{width:100%;background:rgba(245,200,66,.05);border:1px solid rgba(245,200,66,.2);color:var(--parchment);font-family:'Cinzel',serif;font-size:18px;letter-spacing:4px;text-align:center;padding:12px;border-radius:3px;outline:none;margin-bottom:20px;-webkit-appearance:none}
.setup-input:focus{border-color:rgba(245,200,66,.5);background:rgba(245,200,66,.08)}
.setup-input::-webkit-input-placeholder{color:rgba(245,200,66,.25);font-size:14px}
.setup-input::placeholder{color:rgba(245,200,66,.25);font-size:14px}
.gender-row{display:flex;gap:12px;margin-bottom:24px}
.gender-btn{flex:1;padding:10px 6px;border:1px solid rgba(245,200,66,.2);background:rgba(245,200,66,.04);color:rgba(245,200,66,.5);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;border-radius:3px;cursor:pointer;-webkit-transition:all .2s;transition:all .2s;-webkit-tap-highlight-color:transparent}
.gender-btn.active{border-color:var(--gold);background:rgba(245,200,66,.14);color:var(--gold)}
.setup-btn{width:100%;font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--bg);background:linear-gradient(180deg,#ffdf6b 0%,#d4a012 55%,#e8891a 100%);border:none;padding:14px;border-radius:2px;cursor:pointer;box-shadow:0 0 0 1px var(--gold3),0 4px 14px rgba(245,200,66,.3);-webkit-transition:all .2s;transition:all .2s}
.setup-btn:active{-webkit-transform:translateY(1px);transform:translateY(1px)}
.setup-err{font-size:10px;letter-spacing:2px;color:#e84040;margin-top:10px;min-height:16px;text-transform:uppercase}

/* ── Tela principal ── */
.scene{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:20px;padding:20px 16px}

.title-eye{font-family:'Crimson Pro',serif;font-style:italic;font-size:11px;letter-spacing:4px;color:var(--gold2);text-transform:uppercase;opacity:.6;text-align:center;margin-bottom:4px;-webkit-animation:up 1s ease both;animation:up 1s ease both}
.title-h{font-size:clamp(14px,3vw,22px);font-weight:900;letter-spacing:6px;text-transform:uppercase;text-align:center;background:linear-gradient(180deg,#ffdf6b 0%,#d4a012 55%,#e8891a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 10px rgba(245,200,66,.35));-webkit-animation:up 1s ease .1s both;animation:up 1s ease .1s both}

/* ── Mensagem de contagem / estado ── */
.count-msg{text-align:center;max-width:300px;-webkit-animation:up .8s ease .2s both;animation:up .8s ease .2s both}
.count-main{font-family:'Crimson Pro',serif;font-style:italic;font-size:15px;line-height:1.6;color:var(--parchment);margin-bottom:6px}
.count-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,200,66,.35)}

/* ── Stage do biscoito ── */
.stage{position:relative;width:300px;height:240px;display:flex;align-items:center;justify-content:center;-webkit-animation:up 1s ease .3s both;animation:up 1s ease .3s both}
.aura{position:absolute;inset:30px;border-radius:50%;background:radial-gradient(circle,rgba(245,200,66,.16) 0%,rgba(232,137,26,.05) 45%,transparent 70%);-webkit-animation:pa 3.5s ease-in-out infinite;animation:pa 3.5s ease-in-out infinite}
@-webkit-keyframes pa{0%,100%{-webkit-transform:scale(1);opacity:.7}50%{-webkit-transform:scale(1.08);opacity:1}}
@keyframes pa{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.08);opacity:1}}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(245,200,66,.11);-webkit-animation:pr 3.5s ease-out infinite;animation:pr 3.5s ease-out infinite}
.ring:nth-child(2){inset:40px;-webkit-animation-delay:0s;animation-delay:0s}
.ring:nth-child(3){inset:18px;-webkit-animation-delay:.7s;animation-delay:.7s;border-color:rgba(245,200,66,.06)}
.ring:nth-child(4){inset:-4px;-webkit-animation-delay:1.4s;animation-delay:1.4s;border-color:rgba(245,200,66,.04)}
@-webkit-keyframes pr{0%{-webkit-transform:scale(.85);opacity:.8}100%{-webkit-transform:scale(1.25);opacity:0}}
@keyframes pr{0%{transform:scale(.85);opacity:.8}100%{transform:scale(1.25);opacity:0}}
.orbit{position:absolute;inset:0;-webkit-animation:orb 14s linear infinite;animation:orb 14s linear infinite}
.rune{position:absolute;font-size:11px;color:var(--gold2);opacity:.3;text-shadow:0 0 8px #ffdf6b;-webkit-animation:rg 3s ease-in-out infinite;animation:rg 3s ease-in-out infinite}
.rune:nth-child(1){top:5%;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);-webkit-animation-delay:0s;animation-delay:0s}
.rune:nth-child(2){top:27%;right:4%;-webkit-animation-delay:.5s;animation-delay:.5s}
.rune:nth-child(3){bottom:27%;right:4%;-webkit-animation-delay:1s;animation-delay:1s}
.rune:nth-child(4){bottom:5%;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);-webkit-animation-delay:1.5s;animation-delay:1.5s}
.rune:nth-child(5){bottom:27%;left:4%;-webkit-animation-delay:2s;animation-delay:2s}
.rune:nth-child(6){top:27%;left:4%;-webkit-animation-delay:2.5s;animation-delay:2.5s}
@-webkit-keyframes orb{from{-webkit-transform:rotate(0)}to{-webkit-transform:rotate(360deg)}}
@keyframes orb{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@-webkit-keyframes rg{0%,100%{opacity:.22}50%{opacity:.82;color:var(--teal);text-shadow:0 0 14px var(--teal)}}
@keyframes rg{0%,100%{opacity:.22}50%{opacity:.82;color:var(--teal);text-shadow:0 0 14px var(--teal)}}

/* ── Cookie wrapper ── */
.cookie-wrap{position:relative;cursor:pointer;width:280px;height:155px;
  filter:drop-shadow(0 0 22px rgba(245,200,66,.5)) drop-shadow(0 14px 36px rgba(0,0,0,.9));
  -webkit-animation:fl 4s ease-in-out infinite;animation:fl 4s ease-in-out infinite;
  -webkit-transition:filter .3s;transition:filter .3s}
.cookie-wrap:hover{filter:drop-shadow(0 0 40px rgba(245,200,66,1)) drop-shadow(0 16px 46px rgba(0,0,0,.95))}
@-webkit-keyframes fl{0%,100%{-webkit-transform:translateY(0) rotate(-.5deg)}50%{-webkit-transform:translateY(-10px) rotate(.5deg)}}
@keyframes fl{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-10px) rotate(.5deg)}}
.cookie-wrap.open{-webkit-animation:none;animation:none;cursor:default}
/* crack shake */
.cookie-wrap.crack{-webkit-animation:cs .44s ease forwards;animation:cs .44s ease forwards;pointer-events:none}
@-webkit-keyframes cs{0%{-webkit-transform:rotate(0)}15%{-webkit-transform:translateY(-5px) rotate(-3deg)}35%{-webkit-transform:translateY(3px) rotate(3deg)}55%{-webkit-transform:translateY(-2px) rotate(-2deg)}80%{-webkit-transform:translateY(1px) rotate(1deg)}100%{-webkit-transform:rotate(0)}}
@keyframes cs{0%{transform:rotate(0)}15%{transform:translateY(-5px) rotate(-3deg)}35%{transform:translateY(3px) rotate(3deg)}55%{transform:translateY(-2px) rotate(-2deg)}80%{transform:translateY(1px) rotate(1deg)}100%{transform:rotate(0)}}

/* Partículas */
.cp{position:absolute;border-radius:50%;top:50%;left:50%;opacity:0;
  -webkit-animation:cpf var(--du,.8s) ease-out forwards var(--dl2,0s);
  animation:cpf var(--du,.8s) ease-out forwards var(--dl2,0s)}
@-webkit-keyframes cpf{0%{-webkit-transform:translate(-50%,-50%) scale(1);opacity:1}100%{-webkit-transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(0);opacity:0}}
@keyframes cpf{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(0);opacity:0}}

/* ── Fortune slip ── */
.slip{width:min(285px,88vw);background:var(--parchment);border:1px solid rgba(200,155,30,.4);border-radius:3px;padding:18px 22px;text-align:center;box-shadow:0 0 0 1px rgba(245,200,66,.15),0 6px 24px rgba(0,0,0,.65),inset 0 0 30px rgba(245,200,66,.04);display:none;position:relative;-webkit-animation:up .8s ease .2s both;animation:up .8s ease .2s both}
.slip.on{display:block;-webkit-animation:sr .55s cubic-bezier(.34,1.56,.64,1) both;animation:sr .55s cubic-bezier(.34,1.56,.64,1) both}
@-webkit-keyframes sr{from{opacity:0;-webkit-transform:scaleY(.15) translateY(-8px)}to{opacity:1;-webkit-transform:none}}
@keyframes sr{from{opacity:0;transform:scaleY(.15) translateY(-8px)}to{opacity:1;transform:none}}
.slip::before,.slip::after{content:'✦';position:absolute;color:var(--gold2);font-size:9px;top:7px}
.slip::before{left:9px}.slip::after{right:9px}
.sl-header{font-size:8px;letter-spacing:3px;color:var(--gold3);text-transform:uppercase;margin-bottom:9px;opacity:.75}
.sl-text{font-family:'Crimson Pro',serif;font-style:italic;font-size:14px;line-height:1.65;color:var(--brown);margin-bottom:10px}
.sl-div{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);margin:8px auto}
.sl-days{font-size:11px;letter-spacing:3px;color:var(--gold3);font-family:'Cinzel',serif}

/* ── Botão ── */
.btn{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--bg);background:linear-gradient(180deg,#ffdf6b 0%,#d4a012 55%,#e8891a 100%);border:none;padding:13px 28px;border-radius:2px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 0 0 1px var(--gold3),0 4px 14px rgba(245,200,66,.3),inset 0 1px 0 rgba(255,255,255,.3);-webkit-transition:all .3s;transition:all .3s;-webkit-animation:up 1s ease .5s both;animation:up 1s ease .5s both;-webkit-tap-highlight-color:transparent}
.btn:active{-webkit-transform:translateY(1px);transform:translateY(1px)}
.btn.hidden{display:none}

/* ── Mensagem biscoito vencido ── */
.expired-msg{text-align:center;max-width:280px;padding:20px;opacity:0;-webkit-animation:up .8s ease .3s forwards;animation:up .8s ease .3s forwards}
.expired-icon{font-size:28px;margin-bottom:12px;opacity:.5}
.expired-text{font-family:'Crimson Pro',serif;font-style:italic;font-size:14px;line-height:1.7;color:rgba(245,200,66,.45)}

/* ── Mensagem "volte amanhã" ── */
.tomorrow-msg{text-align:center;max-width:280px;padding:16px 0;opacity:0;-webkit-animation:up .8s ease .3s forwards;animation:up .8s ease .3s forwards}
.tomorrow-text{font-family:'Crimson Pro',serif;font-style:italic;font-size:13px;line-height:1.7;color:rgba(245,200,66,.5);margin-bottom:6px}
.tomorrow-sub{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,200,66,.25)}

/* PWA prompt */
.pwa-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(20,12,4,.96);border-top:1px solid rgba(245,200,66,.15);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:50;-webkit-animation:slideup .4s ease both;animation:slideup .4s ease both}
@-webkit-keyframes slideup{from{-webkit-transform:translateY(100%)}to{-webkit-transform:none}}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.pwa-txt{font-size:10px;letter-spacing:1px;color:rgba(245,200,66,.6);line-height:1.4}
.pwa-txt strong{color:var(--gold);display:block;font-size:11px;letter-spacing:2px}
.pwa-actions{display:flex;gap:8px;flex-shrink:0}
.pwa-ok{font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--bg);background:var(--gold);border:none;padding:8px 14px;border-radius:2px;cursor:pointer}
.pwa-x{font-family:'Cinzel',serif;font-size:9px;color:rgba(245,200,66,.4);background:transparent;border:1px solid rgba(245,200,66,.15);padding:8px 10px;border-radius:2px;cursor:pointer}
</style>
</head>
<body>
<div class="bg" id="bg"></div>
<div id="ac" style="position:fixed;inset:0;pointer-events:none;z-index:5"></div>

<!-- ── Tela de setup ── -->
<div class="screen" id="screen-setup">
  <div class="setup-box">
    <div class="setup-title">Oráculo do Tempo</div>
    <div class="setup-h">Biscoito da Sorte</div>
    <label class="setup-label" for="inp-data">Mês e ano de nascimento</label>
    <input class="setup-input" id="inp-data" type="text" inputmode="numeric" placeholder="MM/AA" maxlength="5" autocomplete="off">
    <label class="setup-label">Gênero (para expectativa IBGE)</label>
    <div class="gender-row">
      <button class="gender-btn" id="btn-m" onclick="selGender('M')">♂ Masculino</button>
      <button class="gender-btn" id="btn-f" onclick="selGender('F')">♀ Feminino</button>
    </div>
    <button class="setup-btn" onclick="setupConfirm()">✦ Confirmar ✦</button>
    <div class="setup-err" id="setup-err"></div>
  </div>
</div>

<!-- ── Tela principal ── -->
<div class="screen hidden" id="screen-main">
  <div class="scene">
    <div>
      <div class="title-eye" id="title-eye">Oráculo do Tempo</div>
      <div class="title-h">Biscoito da Sorte</div>
    </div>

    <div class="count-msg" id="count-msg"></div>

    <div class="stage">
      <div class="aura"></div>
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="orbit">
        <span class="rune">⚜</span><span class="rune">✦</span><span class="rune">⟡</span>
        <span class="rune">⚜</span><span class="rune">✦</span><span class="rune">⟡</span>
      </div>

      <!-- Cookie: SVG real com duas asas que se abrem -->
      <div class="cookie-wrap" id="cookie">
        <!--
          Biscoito da sorte — vista frontal, asa esquerda + asa direita.
          Paths extraídos do SVG original (grupo 5 / objetos).
          viewBox="40 44 240 133" cobre exatamente o biscoito frontal.
          As duas asas são <g id="cL"> e <g id="cR">, animadas via JS.
        -->
        <svg width="280" height="155" viewBox="40 44 240 133" xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible">
          <defs>
            <radialGradient id="gL" cx="68%" cy="30%" r="75%">
              <stop offset="0%" stop-color="#FFCE94"/>
              <stop offset="30%" stop-color="#FFB45F"/>
              <stop offset="65%" stop-color="#D4861A"/>
              <stop offset="100%" stop-color="#8B4E08"/>
            </radialGradient>
            <radialGradient id="gR" cx="32%" cy="30%" r="75%">
              <stop offset="0%" stop-color="#FFCE94"/>
              <stop offset="30%" stop-color="#FFB45F"/>
              <stop offset="65%" stop-color="#D4861A"/>
              <stop offset="100%" stop-color="#8B4E08"/>
            </radialGradient>
            <radialGradient id="gC" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#F8EEE0"/>
              <stop offset="100%" stop-color="#DCCFC0"/>
            </radialGradient>
            <linearGradient id="gPap" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#F8F0D8"/>
              <stop offset="100%" stop-color="#DDD098"/>
            </linearGradient>
          </defs>

          <!-- sombra no chão -->
          <ellipse cx="163" cy="174" rx="88" ry="8" fill="rgba(0,0,0,.35)"/>

          <!-- ── ASA ESQUERDA ── -->
          <g id="cL">
            <path fill="url(#gL)" d="M139.2,135.5c-0.04,2.49-0.4,4-1.14,4.22c-6.23,1.85-86.73-2.79-90.46-13.77
              c-1.35-3.98,2.95-11.96,9.97-21.36c17.23-23.07,50.8-54.69,57.12-56.56C122.6,45.8,139.5,117.2,139.2,135.5z"/>
            <!-- highlight interno -->
            <path fill="#EE7115" opacity=".55" d="M131,134.6c-3.07-0.23-7.05-10.84-10.54-24.19c-1.85-7.03-3.56-14.82-4.93-22.25
              c-2.96-16.06-4.34-30.46-2.08-31.87c3.75-2.34,8.71,10.34,12.73,26.14c1.93,7.61,3.64,15.94,4.89,23.67
              C133.7,121.7,134.3,134.8,131,134.6z"/>
            <!-- brilho -->
            <path fill="#FFCE94" d="M99.7,73.2c-3.1-3.6-19.3,6.3-14,13.6C91.1,94.2,106.3,80.9,99.7,73.2z"/>
            <circle fill="#FFCE94" cx="78.5" cy="95.2" r="3.7"/>
            <!-- detalhe laranja escuro (fenda central) -->
            <path fill="#EE7115" opacity=".35" d="M139.2,135.5c-0.04,2.49-0.4,4-1.14,4.22c-6.23,1.85-86.73-2.79-90.46-13.77
              c-1.35-3.98,2.95-11.96,9.97-21.36c-0.64,9.18,0.68,18.74,8.32,20.78c15.5,4.14,23.77-4.13,36.17-1.55
              C113.8,126.3,128.6,145,139.2,135.5z"/>
          </g>

          <!-- ── FAIXA CENTRAL (papel + dobra) ── -->
          <g id="cC">
            <path fill="url(#gC)" d="M212.7,73.8c-1.02,8.04-2.79,17.85-4.91,27.21c-0.14,0.65-0.29,1.29-0.44,1.93
              c-3.38-0.39-7.36-0.77-11.75-1.03c-13.4-0.77-49.72-0.41-64.5,4.17c-3.72,1.15-7.28,2.57-10.61,4.31
              c-0.18-0.7-0.37-1.41-0.55-2.12c-1.64-6.46-3.15-13.44-4.38-20.13c3.03-1.8,6.62-3.77,10.65-5.73
              c14.84-7.19,54.95-14.09,76.65-10.81C206.2,72.1,209.5,72.8,212.7,73.8z"/>
            <path fill="rgba(220,195,160,.5)" d="M207.8,101c-0.14,0.65-0.29,1.29-0.44,1.93c-3.38-0.39-7.36-0.77-11.75-1.03

            <path fill="rgba(255,252,230,.4)" d="M166,95c20-1.8,43-2.8,64-0.6l0.5,4c-21-2.2-44-1.2-65,0.6z"/>

          <div class="cp" style="width:5px;height:5px;background:#e8a030;--tx:74px;--ty:-34px;--du:.66s;--dl2:.04s"></div>

          <div class="cp" style="width:6px;height:6px;background:#f5c842;--tx:54px;--ty:-52px;--du:.72s;--dl2:.06s"></div>
          <div class="cp" style="width:4px;height:4px;background:#d4a012;--tx:-80px;--ty:-10px;--du:.62s;--dl2:.03s"></div>
          <div class="cp" style="width:5px;height:5px;background:#f0b820;--tx:82px;--ty:-14px;--du:.74s;--dl2:.05s"></div>
          <div class="cp" style="width:4px;height:4px;background:#ffc040;--tx:18px;--ty:-70px;--du:.86s;--dl2:.01s"></div>
          <div class="cp" style="width:8px;height:8px;background:#f5c842;--tx:-20px;--ty:-66px;--du:.92s;--dl2:.03s"></div>
        </div>
      </div><!-- /cookie-wrap -->

    <!-- Paper slip -->
    <div class="slip" id="slip">
      <div class="sl-header">✦ &nbsp; Sua Profecia &nbsp; ✦</div>
      <div class="sl-text" id="sl-text"></div>
      <div class="sl-div"></div>
      <div class="sl-days" id="sl-days" style="font-size:10px;letter-spacing:2px;line-height:1.5"></div>
    </div>

    <!-- expired -->
    <div class="expired-msg hidden" id="expired-msg">
      <div class="expired-icon">🍪</div>
      <div class="expired-text" id="expired-text"></div>
    </div>

    <!-- tomorrow -->
    <div class="tomorrow-msg hidden" id="tomorrow-msg">
      <div class="tomorrow-text">Volte amanhã.</div>
      <div class="tomorrow-sub">Um novo biscoito espera por você</div>
    </div>

    <button class="btn hidden" id="open-btn">✦ &nbsp; Abrir Biscoito &nbsp; ✦</button>

  </div>
</div>

<!-- PWA prompt -->
<div class="pwa-bar hidden" id="pwa-bar">
  <div class="pwa-txt"><strong>Instalar App</strong>Salve na tela inicial para não perder seus biscoitos</div>
  <div class="pwa-actions">
    <button class="pwa-ok" id="pwa-ok">Instalar</button>
    <button class="pwa-x" onclick="dismissPwa()">✕</button>
  </div>
</div>

<script>
// ── Frases por faixa de biscoitos ──
var FRASES = {
  alto: [  // > 20 000 biscoitos
    'Você ainda tem muitos biscoitos pela frente. Abra cada um com intenção.',
    'Uma coleção enorme de surpresas te espera. A jornada mal começou.',
    'Com tantos biscoitos ainda guardados, o segredo não é pressa — é escolha.',
    'Cada biscoito que você abre é uma chance de recomeçar. Use-as.',
    'Você tem mais biscoitos para abrir do que memórias para contar. Que privilégio.'
  ],
  medio: [  // 10 000 – 20 000 biscoitos
    'Você já abriu muitos biscoitos. Os que restam sabem mais.',
    'No meio da jornada, cada biscoito revela quem você realmente é.',
    'Nem o começo cheio de energia, nem o fim cheio de pressa — agora é a hora do sabor.',
    'Os biscoitos que restam valem tanto quanto os que você já abriu. Aproveite-os.',
    'Aqui, no meio, é onde os biscoitos têm mais recheio.'
  ],
  baixo: [  // 5 000 – 10 000 biscoitos
    'Cada biscoito que sobra é uma moeda rara. Abra com quem importa.',
    'A beleza de uma coleção bem aberta não está na quantidade — está na qualidade.',
    'Você chegou longe. Os biscoitos que restam são os mais preciosos.',
    'O biscoito que se despede ilumina mais do que o que acabou de ser recebido.',
    'Saber que os biscoitos são finitos é o maior presente. Você já entende isso.'
  ],
  fim: [  // < 5 000 biscoitos
    'Cada biscoito que abre agora é um presente que poucos sabem apreciar. Você sabe.',
    'Não é sobre quantos biscoitos restam — é sobre a doçura que você deixa para trás.',
    'A sabedoria de quem abriu tantos biscoitos não cabe em papel algum.',
    'Você abriu biscoitos que outros ainda nem sonharam receber. Isso vale tudo.',
    'O biscoito conta menos do que o sorriso ao abri-lo. Sorria agora.'
  ],
  vencido: 'Este biscoito passou do prazo sem ser aberto. O de amanhã vai te esperar.'
};

// IBGE expectativa de vida
var EV = { M: 73.3, F: 80.5, N: 76.9 };

function calcDias(mesNasc, anoNasc, genero) {
  var hoje = new Date();
  var anoAtual = hoje.getFullYear();
  var mesAtual = hoje.getMonth() + 1;
  // idade em anos (aproximada)
  var idadeAnos = anoAtual - (2000 + anoNasc);
  if (mesAtual < mesNasc) idadeAnos--;
  if (idadeAnos < 0) idadeAnos = 0;
  var ev = EV[genero] || EV.N;
  // sobrevida: se já passou da expectativa, acrescenta 6.2 anos bonus
  var expectativa = ev;
  if (idadeAnos > ev) expectativa = idadeAnos + 6.2;
  var diasRestantes = Math.round((expectativa - idadeAnos) * 365.25);
  if (diasRestantes < 0) diasRestantes = 0;
  return diasRestantes;
}

function getFaixaFrases(dias) {
  if (dias > 20000) return FRASES.alto;
  if (dias > 10000) return FRASES.medio;
  if (dias > 5000) return FRASES.baixo;
  return FRASES.fim;
}

function getFrase(dias) {
  var arr = getFaixaFrases(dias);
  return arr[Math.floor(Math.random() * arr.length)];
}

function todayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}

function load(k) { try { return localStorage.getItem(k); } catch(e){ return null; } }
function save(k,v) { try { localStorage.setItem(k,v); } catch(e){} }

// ── Dados de estado ──
var _gender = null;
var _deferredInstall = null;

function selGender(g) {
  _gender = g;
  document.getElementById('btn-m').className = 'gender-btn' + (g==='M'?' active':'');
  document.getElementById('btn-f').className = 'gender-btn' + (g==='F'?' active':'');
}

// Formata input MM/AA
document.getElementById('inp-data').addEventListener('input', function() {
  var v = this.value.replace(/\D/g,'');
  if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2,4);
  this.value = v;
});

function setupConfirm() {
  var err = document.getElementById('setup-err');
  err.textContent = '';
  var raw = document.getElementById('inp-data').value.trim();
  if (!raw.match(/^\d{2}\/\d{2}$/)) { err.textContent = 'Use o formato MM/AA'; return; }
  var parts = raw.split('/');
  var mes = parseInt(parts[0], 10);
  var ano = parseInt(parts[1], 10);
  if (mes < 1 || mes > 12) { err.textContent = 'Mês inválido (01-12)'; return; }
  var anoFull = 2000 + ano;
  var anoAtual = new Date().getFullYear();
  if (anoFull > anoAtual) { err.textContent = 'Ano não pode ser futuro'; return; }
  if (!_gender) { err.textContent = 'Selecione um gênero'; return; }

  save('bsc_mes', mes);
  save('bsc_ano', ano);
  save('bsc_gen', _gender);

  showMain(mes, ano, _gender);
}

function showMain(mes, ano, gen) {
  document.getElementById('screen-setup').className = 'screen hidden';
  document.getElementById('screen-main').className = 'screen hidden';
  // remove "screen" class completely to allow background to show
  document.getElementById('screen-main').style.position = 'relative';
  document.getElementById('screen-main').style.background = 'transparent';
  document.getElementById('screen-main').style.zIndex = '10';
  document.getElementById('screen-main').className = 'screen hidden';
  // Actually just show it properly
  var sm = document.getElementById('screen-main');
  sm.style.position = '';
  sm.style.background = '';
  sm.style.zIndex = '';
  sm.className = 'screen';

  var dias = calcDias(mes, ano, gen);
  renderMain(dias);

  // PWA prompt after 3s
  setTimeout(showPwa, 3000);
}

function renderMain(dias) {
  var cookie = document.getElementById('cookie');
  var slip = document.getElementById('slip');
  var openBtn = document.getElementById('open-btn');
  var expiredMsg = document.getElementById('expired-msg');
  var tomorrowMsg = document.getElementById('tomorrow-msg');
  var countMsg = document.getElementById('count-msg');

  // Reset state
  cookie.className = 'cookie-wrap';
  slip.className = 'slip';
  openBtn.className = 'btn hidden';
  expiredMsg.className = 'expired-msg hidden';
  tomorrowMsg.className = 'tomorrow-msg hidden';

  var today = todayKey();
  var lastOpened = load('bsc_last_opened');   // YYYY-M-D of last opened
  var lastCreated = load('bsc_last_created');  // YYYY-M-D of last cookie creation

  // Count message
  countMsg.innerHTML = '<div class="count-main">Você tem aproximadamente <strong style="color:var(--gold)">' + dias.toLocaleString('pt-BR') + ' biscoitos</strong> para abrir, gostaria de começar pelo de hoje?</div><div class="count-sub">Um biscoito por dia · não perca nenhum</div>';

  // State machine:
  // 1. Never opened → show cookie, ready to open
  // 2. Opened today → show result, no button
  // 3. Yesterday's was not opened (missed) → show expired message
  // 4. Previous day opened, today's available → show new cookie

  if (!lastCreated) {
    // First ever visit
    save('bsc_last_created', today);
    showCookieReady(dias);
    return;
  }

  if (lastOpened === today) {
    // Already opened today
    var frase = load('bsc_frase_today') || getFrase(dias);
    showOpened(frase, dias);
    showTomorrow();
    return;
  }

  // Check if today's cookie is available or if yesterday was missed
  var created = new Date(lastCreated.replace(/-(\d)-/g,'-0$1-').replace(/-(\d)$/,'-0$1'));
  var todayD = new Date(today.replace(/-(\d)-/g,'-0$1-').replace(/-(\d)$/,'-0$1'));
  var diffMs = todayD - created;
  var diffDays = Math.floor(diffMs / 86400000);

  if (diffDays === 0) {
    // Same day as creation, not yet opened
    showCookieReady(dias);
    return;
  }

  if (diffDays === 1 && !lastOpened) {
    // Created yesterday, never opened → expired
    showExpired(dias);
    save('bsc_last_created', today);
    return;
  }

  if (diffDays >= 1) {
    // New day → create fresh cookie (previous expired if not opened)
    save('bsc_last_created', today);
    if (lastOpened && lastOpened !== lastCreated) {
      // gap — expired
      showExpired(dias);
    } else {
      showCookieReady(dias);
    }
    return;
  }

  showCookieReady(dias);
}

function showCookieReady(dias) {
  var cookie = document.getElementById('cookie');
  var openBtn = document.getElementById('open-btn');
  cookie.className = 'cookie-wrap';
  openBtn.className = 'btn';
  openBtn.textContent = '✦   Abrir Biscoito   ✦';

  // Bind click+touch
  var _dias = dias;
  function doOpen() { openCookie(_dias); }
  cookie.onclick = doOpen;
  openBtn.onclick = doOpen;
  openBtn.addEventListener('touchend', function(e){ e.preventDefault(); doOpen(); }, {passive:false});
  cookie.addEventListener('touchend', function(e){ e.preventDefault(); doOpen(); }, {passive:false});
}

function showOpened(frase, dias) {
  var cookie = document.getElementById('cookie');
  var slip = document.getElementById('slip');
  cookie.className = 'cookie-wrap open';
  document.getElementById('sl-text').textContent = frase;
  document.getElementById('sl-days').textContent = 'você ainda tem ' + dias.toLocaleString('pt-BR') + ' biscoitos para abrir';
  slip.className = 'slip on';
}

function showExpired(dias) {
  var expiredMsg = document.getElementById('expired-msg');
  var cookie = document.getElementById('cookie');
  cookie.style.opacity = '0.3';
  cookie.style.pointerEvents = 'none';
  expiredMsg.className = 'expired-msg';
  document.getElementById('expired-text').textContent = FRASES.vencido;
  showTomorrow();
}

function showTomorrow() {
  document.getElementById('tomorrow-msg').className = 'tomorrow-msg';
}

function openCookie(dias) {
  var cookie = document.getElementById('cookie');
  if (cookie.className.indexOf('open') >= 0) return;

  // crack shake first
  cookie.onclick = null;
  cookie.className = 'cookie-wrap crack';

  setTimeout(function() {
    cookie.className = 'cookie-wrap open';

    // Anima asas: esquerda vai pra esquerda, direita vai pra direita
    var gL = document.getElementById('cL');
    var gR = document.getElementById('cR');
    var gC = document.getElementById('cC');
    if (gL) { gL.style.webkitTransition = 'transform .6s cubic-bezier(.34,1.2,.64,1)'; gL.style.transition = 'transform .6s cubic-bezier(.34,1.2,.64,1)'; gL.style.transformBox = 'fill-box'; gL.style.transformOrigin = 'right center'; gL.style.transform = 'translateX(-60px) translateY(-12px) rotate(-14deg)'; }
    if (gR) { gR.style.webkitTransition = 'transform .6s cubic-bezier(.34,1.2,.64,1)'; gR.style.transition = 'transform .6s cubic-bezier(.34,1.2,.64,1)'; gR.style.transformBox = 'fill-box'; gR.style.transformOrigin = 'left center'; gR.style.transform = 'translateX(60px) translateY(-12px) rotate(14deg)'; }
    if (gC) { gC.style.webkitTransition = 'opacity .4s ease .2s'; gC.style.transition = 'opacity .4s ease .2s'; gC.style.opacity = '0'; }

    var dias2 = dias;
    var frase = getFrase(dias2);
    save('bsc_last_opened', todayKey());
    save('bsc_frase_today', frase);

    showOpened(frase, dias2);
    showTomorrow();

    document.getElementById('open-btn').className = 'btn hidden';

    // Restart particles
    var cps = document.getElementById('cps');
    var ps = cps.querySelectorAll('.cp');
    for (var i = 0; i < ps.length; i++) {
      ps[i].style.animation = 'none';
      void ps[i].offsetWidth;
      ps[i].style.animation = '';
    }
  }, 460);
}

// ── Init ──
(function() {
  var mes = load('bsc_mes');
  var ano = load('bsc_ano');
  var gen = load('bsc_gen');
  if (mes && ano && gen) {
    showMain(parseInt(mes,10), parseInt(ano,10), gen);
  }
  // else stays on setup screen
})();

// ── PWA ──
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _deferredInstall = e;
});

function showPwa() {
  if (_deferredInstall && !load('bsc_pwa_dismissed')) {
    document.getElementById('pwa-bar').className = 'pwa-bar';
  }
}

document.getElementById('pwa-ok').addEventListener('click', function() {
  document.getElementById('pwa-bar').className = 'pwa-bar hidden';
  if (_deferredInstall) {
    _deferredInstall.prompt();
    _deferredInstall.userChoice.then(function() { _deferredInstall = null; });
  }
});

function dismissPwa() {
  save('bsc_pwa_dismissed','1');
  document.getElementById('pwa-bar').className = 'pwa-bar hidden';
}

// ── Stars ──
(function() {
  var bg = document.getElementById('bg');
  for (var i = 0; i < 80; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var z = Math.random() * 2.2 + 0.4;
    s.style.cssText = 'width:'+z+'px;height:'+z+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(2+Math.random()*4)+'s;--dl:'+Math.random()*5+'s;--mo:'+(0.3+Math.random()*0.7);
    bg.appendChild(s);
  }
})();

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js');
  });
}

// ── Ambient particles ──
(function() {
  var c = document.getElementById('ac');
  var cols = ['#f5c842','#d4a012','#e8891a','#7bbfff','#2ecc9b'];
  for (var i = 0; i < 14; i++) {
    var p = document.createElement('div');
    p.className = 'ap';
    var z = Math.random() * 3 + 1.5;
    p.style.cssText = 'width:'+z+'px;height:'+z+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';left:'+(15+Math.random()*70)+'%;bottom:'+Math.random()*20+'%;--d:'+(6+Math.random()*9)+'s;--dl:'+Math.random()*9+'s;--dx:'+((Math.random()-.5)*70)+'px;filter:blur(.3px)';
    c.appendChild(p);
  }
})();
</script>
